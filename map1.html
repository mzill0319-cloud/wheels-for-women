<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Welcome to Wheels for Women</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #ffe6f2;
            color: #333;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            text-align: center;
        }

        .container {
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.2);
            width: 350px;
        }

        h1 {
            color: #ff1493;
        }

        p {
            font-size: 18px;
        }

        input, select {
            width: 90%;
            padding: 10px;
            margin: 8px 0;
            border: 1px solid #ccc;
            border-radius: 5px;
        }

        .btn {
            background-color: #ff1493;
            color: white;
            border: none;
            padding: 10px 15px;
            cursor: pointer;
            font-size: 16px;
            width: 100%;
            border-radius: 5px;
            margin-top: 10px;
        }

        .btn:hover {
            background-color: #ff007f;
        }

        .link {
            color: #ff1493;
            cursor: pointer;
            font-size: 14px;
            margin-top: 10px;
            display: block;
        }

        .error {
            color: red;
            font-size: 12px;
            margin-top: 5px;
            display: none;
        }
    </style>
</head>
<body>
    <!-- Sign In Section -->
    <div class="container" id="signInForm">
        <h1>Welcome to Wheels for Women! 💖</h1>
        <p>Your trusted ride, only for women. Safe, reliable, and easy to use!</p>
        <h2>Sign In</h2>
        <form id="signInForm">
            <input type="email" id="loginEmail" placeholder="Enter Email" required>
            <input type="password" id="loginPassword" placeholder="Enter Password" required>
            <div id="signInError" class="error"></div>
            <button type="button" class="btn" onclick="signIn()">Sign In</button>
        </form>
        <span class="link" onclick="showRegistration()">Not a member? Register here!</span>
    </div>

    <!-- Registration Section (Hidden Initially) -->
    <div class="container" id="registrationForm" style="display: none;">
        <h2>Register Now</h2>
        <form id="registerForm">
            <input type="text" id="name" placeholder="Full Name" required>
            <input type="email" id="email" placeholder="Email" required>
            <input type="text" id="gender" placeholder="Gender (Must be 'Female')" required>
            <select id="role" required>
                <option value="customer">Customer</option>
                <option value="driver">Driver</option>
                <option value="admin">Admin</option>
            </select>
            <input type="password" id="password" placeholder="Password" required>
            <input type="password" id="confirmPassword" placeholder="Confirm Password" required>
            <div id="registerError" class="error"></div>
            <button type="button" class="btn" onclick="register()">Register</button>
        </form>
        <span class="link" onclick="showSignIn()">Already a member? Sign in here!</span>
    </div>

    <script>
        function showRegistration() {
            document.getElementById('signInForm').style.display = 'none';
            document.getElementById('registrationForm').style.display = 'block';
        }

        function showSignIn() {
            document.getElementById('registrationForm').style.display = 'none';
            document.getElementById('signInForm').style.display = 'block';
        }

        async function register() {
            const name = document.getElementById('name').value;
            const email = document.getElementById('email').value;
            const gender = document.getElementById('gender').value;
            const role = document.getElementById('role').value;
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirmPassword').value;

            if (password !== confirmPassword) {
                document.getElementById('registerError').innerText = "Passwords do not match!";
                document.getElementById('registerError').style.display = "block";
                return;
            }

            const response = await fetch('http://localhost:3000/register', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ name, email, gender, role, password })
            });

            const result = await response.json();
            if (response.ok) {
                alert(result.message);
                showSignIn();
            } else {
                document.getElementById('registerError').innerText = result.error;
                document.getElementById('registerError').style.display = "block";
            }
        }
    </script>
</body>
</html>
