<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wheels for Women - Ride Service</title>
    <link rel="stylesheet" href="https://unpkg.com/maplibre-gl@2.4.0/dist/maplibre-gl.css" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            text-align: center;
            background: #f7c2c2;
        }

        #map {
            height: 500px;
            width: 100%;
            margin-top: 20px;
        }

        .module-header {
            margin: 20px auto;
            font-size: 18px;
            font-weight: bold;
        }

        #confirmationSection {
            display: none;
            padding: 20px;
            background-color: #f8f9fa;
            border-radius: 10px;
            margin: 20px auto;
            max-width: 800px;
        }

        #bookingSection {
            padding: 20px;
            max-width: 800px;
            margin: 0 auto;
        }

        .confirm-button {
            background-color: black;
            color: white;
            border: none;
            cursor: pointer;
        }

        .confirm-button:hover {
            background-color: #333;
        }

        @media (max-width: 576px) {
            #map {
                height: 300px;
            }

            input, select, button, textarea {
                font-size: 14px;
            }
        }
    </style>
</head>
<body>
    <div id="bookingSection">
        <h1 class="mb-4">Wheels for Women - Female Ride Service</h1>

        <div class="module-header">User Registration</div>
        <div class="mb-3">
            <input type="text" class="form-control" id="pickup" placeholder="Pickup Location (e.g., Hyderabad)">
        </div>
        <div class="mb-3">
            <input type="text" class="form-control" id="destination" placeholder="Drop Location (e.g., Secunderabad)">
        </div>

        <div class="module-header">Select Vehicle Type</div>
        <div class="mb-3">
            <select class="form-select" id="vehicleType">
                <option value="Scooty">🛵 Scooty (₹30/km)</option>
                <option value="Auto">🚕 Auto (₹50/km)</option>
                <option value="Cab">🚗 Cab (₹100/km)</option>
            </select>
        </div>
👍
        <button class="btn confirm-button mb-3" onclick="confirmBooking()">Confirm Booking</button>

        <div class="module-header">Safety Features</div>
        <button class="btn btn-danger mb-3" onclick="sendSOS()">🚨 SOS Alert</button>
        <p id="sosMessage" class="text-danger fw-bold"></p>

        <div class="module-header">Ratings and Reviews</div>
        <textarea class="form-control mb-3" id="feedback" placeholder="Leave your feedback" style="height: 100px;"></textarea>
        <button class="btn btn-primary mb-3" onclick="submitFeedback()">Submit Feedback</button>
        <p id="feedbackMessage" class="text-success fw-bold"></p>
    </div>

    <div id="confirmationSection" class="container">
        <h2 class="mb-4">Booking Confirmation</h2>
        <div class="card mb-4">
            <div class="card-body">
                <h5 class="card-title">Booking Details</h5>
                <p class="card-text"><strong>Pickup:</strong> <span id="confirmPickup"></span></p>
                <p class="card-text"><weak>Drop:</weak> <span id="confirmDestination"></span></p>
                <p class="card-text"><strong>Vehicle Type:</strong> <span id="confirmVehicle"></span></p>
                <p class="card-text"><strong>Distance:</strong> <span id="confirmDistance"></span></p>
                <p class="card-text"><strong>Fare:</strong> <span id="confirmFare"></span></p>
            </div>
        </div>
        <div id="map"></div>
        <button class="btn btn-secondary mt-3" onclick="returnToBooking()">Back to Booking</button>
    </div>

    <script src="https://unpkg.com/maplibre-gl@2.4.0/dist/maplibre-gl.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@turf/turf/turf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
    <script>
        let map;

        function initMap() {
            map = new maplibregl.Map({
                container: 'map',
                style: 'https://demotiles.maplibre.org/style.json',
                center: [78.486671, 17.385044],
                zoom: 10
            });
        }

        async function getCoordinates(location) {
            try {
                const response = await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(location)}`);
                const data = await response.json();
                if (data.length > 0) {
                    return [parseFloat(data[0].lon), parseFloat(data[0].lat)];
                } else {
                    throw new Error('Location not found');
                }
            } catch (error) {
                console.error('Error fetching coordinates:', error);
                alert('Error finding location. Please try again.');
                return null;
            }
        }

        async function confirmBooking() {
            const pickup = document.getElementById("pickup").value;
            const destination = document.getElementById("destination").value;
            const vehicleType = document.getElementById("vehicleType").value;

            if (!pickup || !destination) {
                alert("Please enter both pickup and drop locations.");
                return;
            }

            // Fetch coordinates using Nominatim API
            const pickupCoords = await getCoordinates(pickup);
            const destinationCoords = await getCoordinates(destination);

            if (!pickupCoords || !destinationCoords) {
                return;
            }

            // Show confirmation section and hide booking section
            document.getElementById("bookingSection").style.display = "none";
            document.getElementById("confirmationSection").style.display = "block";

            // Populate confirmation details
            document.getElementById("confirmPickup").innerText = pickup;
            document.getElementById("confirmDestination").innerText = destination;
            document.getElementById("confirmVehicle").innerText = vehicleType;

            // Show route and calculate distance/fare
            showRoute(pickupCoords, destinationCoords, vehicleType);

            // Scroll to confirmation section
            document.getElementById("confirmationSection").scrollIntoView({ behavior: "smooth" });
        }

        function showRoute(pickupCoords, destinationCoords, vehicleType) {
            // Clear previous route if exists
            if (map.getSource('route')) {
                map.removeLayer('route');
                map.removeSource('route');
            }

            // Add markers
            new maplibregl.Marker({ color: 'red' })
                .setLngLat(pickupCoords)
                .setPopup(new maplibregl.Popup().setText("Pickup Location"))
                .addTo(map);

            new maplibregl.Marker({ color: 'blue' })
                .setLngLat(destinationCoords)
                .setPopup(new maplibregl.Popup().setText("Drop Location"))
                .addTo(map);

            // Add black line route
            const route = {
                type: 'Feature',
                geometry: {
                    type: 'LineString',
                    coordinates: [pickupCoords, destinationCoords]
                }
            };

            map.addSource('route', {
                type: 'geojson',
                data: route
            });

            map.addLayer({
                id: 'route',
                type: 'line',
                source: 'route',
                layout: {
                    'line-join': 'round',
                    'line-cap': 'round'
                },
                paint: {
                    'line-color': '#000000',
                    'line-width': 4
                }
            });

            // Fit map to show both points
            const bounds = new maplibregl.LngLatBounds();
            bounds.extend(pickupCoords);
            bounds.extend(destinationCoords);
            map.fitBounds(bounds, { padding: 50 });

            // Calculate distance
            const distance = turf.distance(
                turf.point(pickupCoords),
                turf.point(destinationCoords),
                { units: 'kilometers' }
            );

            // Fare logic
            let farePerKm = vehicleType === "Scooty" ? 30 :
                            vehicleType === "Auto" ? 50 : 100;
            const fare = distance * farePerKm;

            // Update confirmation section
            document.getElementById("confirmDistance").innerText = `${distance.toFixed(2)} km`;
            document.getElementById("confirmFare").innerText = `₹${fare.toFixed(2)}`;
        }

        function returnToBooking() {
            document.getElementById("confirmationSection").style.display = "none";
            document.getElementById("bookingSection").style.display = "block";
            document.getElementById("pickup").value = "";
            document.getElementById("destination").value = "";
            document.getElementById("feedback").value = "";
            document.getElementById("sosMessage").innerText = "";
            document.getElementById("feedbackMessage").innerText = "";
            document.getElementById("map").innerHTML = "";
            initMap();
            document.getElementById("bookingSection").scrollIntoView({ behavior: "smooth" });
        }

        function sendSOS() {
            document.getElementById("sosMessage").innerText = "SOS alert sent! Emergency contacts have been notified.";
        }

        function submitFeedback() {
            const feedback = document.getElementById("feedback").value;
            if (feedback.trim() === "") {
                alert("Please enter your feedback.");
            } else {
                document.getElementById("feedbackMessage").innerText = "Thank you for your feedback!";
            }
        }

        window.onload = initMap;
    </script>
</body>
</html>
